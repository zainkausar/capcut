<html>
  <head>
    <style>
      /* ═══════════════════════════════════════════════════════
   MODERN FLOATING NAV — v2
   Floating pill design · blur backdrop · sticky · responsive
═══════════════════════════════════════════════════════ */

/* ── Reset old #nav styles so they don't conflict ── */
#nav { all: unset; }

/* ── NAV WRAPPER ── */
#site-nav {
  position: fixed;
  top: 16px;             /* floating gap from top */
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  width: calc(100% - 40px);   /* 20px gap each side */
  max-width: 1100px;

  /* pill container */
  background: rgba(6, 14, 22, 0.55);
  backdrop-filter: blur(20px) saturate(1.6);
  -webkit-backdrop-filter: blur(20px) saturate(1.6);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 16px;
  box-shadow:
    0 4px 24px rgba(0, 0, 0, 0.45),
    0 1px 0 rgba(255, 255, 255, 0.04) inset;

  transition: background 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
}

/* scrolled state: slightly more opaque */
#site-nav.scrolled {
  background: rgba(6, 14, 22, 0.82);
  border-color: rgba(255, 255, 255, 0.12);
  box-shadow:
    0 8px 40px rgba(0, 0, 0, 0.6),
    0 0 0 1px rgba(0, 240, 255, 0.06),
    0 1px 0 rgba(255, 255, 255, 0.05) inset;
}

/* ── NAV INNER ROW ── */
.sn-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  padding: 0 20px;
  gap: 12px;
}

/* ── LOGO ── */
.sn-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}
.sn-logo-icon {
  width: 34px; height: 34px;
  border-radius: 10px;
  background: linear-gradient(135deg, #00f0ff, #7c3aed);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 14px rgba(0, 240, 255, 0.3);
}
.sn-logo-icon svg { width: 18px; height: 18px; fill: #fff; }
.sn-logo-text {
  font-family: 'Space Grotesk', system-ui, sans-serif;  /* matches your --font-body */
  font-weight: 800;
  font-size: 18px;
  letter-spacing: 0.04em;
  color: #f0f4f8;
  line-height: 1;
}
.sn-logo-text span { color: #00f0ff; }

/* ── DESKTOP LINKS ── */
.sn-links {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  justify-content: center;
}
.sn-link {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  border-radius: 10px;
  font-size: 14px; font-weight: 600;
  color: rgba(255, 255, 255, 0.55);
  text-decoration: none;
  letter-spacing: 0.01em;
  transition: color 0.2s, background 0.2s;
  position: relative;
  white-space: nowrap;
}
.sn-link svg { width: 14px; height: 14px; flex-shrink: 0; }
.sn-link:hover {
  color: #f0f4f8;
  background: rgba(255, 255, 255, 0.06);
}
/* active indicator dot */
.sn-link.active { color: #f0f4f8; }
.sn-link.active::after {
  content: '';
  position: absolute;
  bottom: 5px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%;
  background: #00f0ff;
}

/* ── CTA BUTTON ── */
.sn-cta {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px;
  border-radius: 12px;
  background: #00f0ff;
  color: #000;
  font-size: 13px; font-weight: 800;
  letter-spacing: 0.02em;
  text-decoration: none;
  white-space: nowrap;
  flex-shrink: 0;
  position: relative; overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
}
/* shimmer sweep on CTA */
.sn-cta::before {
  content: '';
  position: absolute;
  top: 0; left: -80%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
  animation: snCtaShimmer 2.8s ease-in-out infinite;
  pointer-events: none;
}
@keyframes snCtaShimmer {
  0%   { left: -80%; }
  100% { left: 180%; }
}
.sn-cta:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 0 36px rgba(0, 240, 255, 0.55);
}
.sn-cta svg { width: 14px; height: 14px; }

/* ── HAMBURGER (mobile only) ── */
.sn-hamburger {
  display: none;                   /* hidden on desktop */
  flex-direction: column;
  align-items: flex-end;
  justify-content: center;
  gap: 5px;
  width: 40px; height: 40px;
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.09);
  cursor: pointer;
  padding: 0 10px;
  transition: background 0.2s, border-color 0.2s;
  flex-shrink: 0;
}
.sn-hamburger:hover {
  background: rgba(0, 240, 255, 0.08);
  border-color: rgba(0, 240, 255, 0.25);
}
/* the three lines */
.sn-hb-line {
  display: block;
  height: 2px; border-radius: 2px;
  background: #f0f4f8;
  transition: width 0.3s cubic-bezier(0.4,0,0.2,1),
              transform 0.35s cubic-bezier(0.4,0,0.2,1),
              opacity 0.25s ease;
  transform-origin: right center;
}
.sn-hb-line:nth-child(1) { width: 18px; }
.sn-hb-line:nth-child(2) { width: 12px; opacity: 0.55; }
.sn-hb-line:nth-child(3) { width: 15px; }

/* ── open state: lines morph into X ── */
.sn-hamburger.open .sn-hb-line:nth-child(1) { width: 18px; transform: translateY(7px) rotate(45deg); }
.sn-hamburger.open .sn-hb-line:nth-child(2) { width: 0; opacity: 0; }
.sn-hamburger.open .sn-hb-line:nth-child(3) { width: 18px; transform: translateY(-7px) rotate(-45deg); }

/* ── MOBILE DROPDOWN MENU ── */
.sn-mobile-menu {
  display: none;           /* JS toggles this to flex */
  flex-direction: column;
  padding: 0 12px 14px;
  gap: 4px;
  /* animates open via max-height trick */
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height 0.38s cubic-bezier(0.4,0,0.2,1),
              opacity 0.28s ease,
              padding 0.3s ease;
}
.sn-mobile-menu.open {
  display: flex;
  max-height: 400px;
  opacity: 1;
  padding: 0 12px 14px;
}
/* top divider line */
.sn-mobile-menu::before {
  content: '';
  display: block;
  height: 1px;
  background: rgba(255, 255, 255, 0.07);
  margin-bottom: 8px;
}

.sn-mobile-link {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border-radius: 12px;
  font-size: 15px; font-weight: 600;
  color: rgba(255, 255, 255, 0.65);
  text-decoration: none;
  transition: background 0.2s, color 0.2s, padding-left 0.2s;
}
.sn-mobile-link:hover {
  background: rgba(255, 255, 255, 0.05);
  color: #f0f4f8;
  padding-left: 18px;
}
.sn-mobile-link-icon {
  width: 34px; height: 34px; border-radius: 9px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.08);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.sn-mobile-link-icon svg { width: 15px; height: 15px; }

.sn-mobile-cta {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin: 6px 0 0;
  padding: 14px;
  border-radius: 12px;
  background: #00f0ff;
  color: #000;
  font-size: 14px; font-weight: 800;
  text-decoration: none;
  letter-spacing: 0.02em;
  box-shadow: 0 0 24px rgba(0, 240, 255, 0.3);
  transition: transform 0.2s, box-shadow 0.2s;
}
.sn-mobile-cta:hover { transform: translateY(-2px); box-shadow: 0 0 36px rgba(0,240,255,0.5); }
.sn-mobile-cta svg { width: 16px; height: 16px; }

/* ── RESPONSIVE BREAKPOINT ── */
@media (max-width: 768px) {
  .sn-links { display: none; }     /* hide desktop links */
  .sn-cta   { display: none; }     /* hide desktop CTA */
  .sn-hamburger { display: flex; } /* show hamburger */

  #site-nav {
    top: 12px;
    width: calc(100% - 24px);
  }
  .sn-inner { height: 54px; padding: 0 14px; }
  .sn-logo-text { font-size: 16px; }
}
    </style>
  </head>
  <body>

<script>
        /* ══════════════════════════════════════════
   MODERN NAV — scroll + hamburger logic
══════════════════════════════════════════ */
(function () {
  const nav        = document.getElementById('site-nav');
  const hamburger  = document.getElementById('snHamburger');
  const mobileMenu = document.getElementById('snMobileMenu');

  /* ── Scroll: add .scrolled class ── */
  let lastY = 0;
  window.addEventListener('scroll', function () {
    const y = window.scrollY;
    if (y > 40) {
      nav.classList.add('scrolled');
    } else {
      nav.classList.remove('scrolled');
    }
    lastY = y;
  }, { passive: true });

  /* ── Toggle mobile menu ── */
  function snOpen() {
    hamburger.classList.add('open');
    mobileMenu.classList.add('open');
    hamburger.setAttribute('aria-expanded', 'true');
    document.addEventListener('click', snOutsideClick, true);
    document.addEventListener('keydown', snEscKey);
  }

  function snClose() {
    hamburger.classList.remove('open');
    mobileMenu.classList.remove('open');
    hamburger.setAttribute('aria-expanded', 'false');
    document.removeEventListener('click', snOutsideClick, true);
    document.removeEventListener('keydown', snEscKey);
  }

  /* expose snClose globally so onclick="snClose()" in HTML works */
  window.snClose = snClose;

  hamburger.addEventListener('click', function (e) {
    e.stopPropagation();
    hamburger.classList.contains('open') ? snClose() : snOpen();
  });

  /* close when clicking outside the nav */
  function snOutsideClick(e) {
    if (!nav.contains(e.target)) snClose();
  }

  /* close on Escape key */
  function snEscKey(e) {
    if (e.key === 'Escape') snClose();
  }

  /* ── Active link highlight based on current URL path ── */
  const path = window.location.pathname;
  document.querySelectorAll('.sn-link, .sn-mobile-link').forEach(function (a) {
    const href = a.getAttribute('href') || '';
    if (href !== '/' && path.startsWith(href)) {
      a.classList.add('active');
    } else if (href === '/' && path === '/') {
      a.classList.add('active');
    }
  });

})();
</script>
